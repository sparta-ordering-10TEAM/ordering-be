name: Build and deploy

on:
  push:
    branches: [ main ]

jobs:
  build-deploy-main:
    runs-on: ubuntu-latest
    environment: ordering-be

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}" >> .env
          echo "JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}" >> .env
          echo "IMAGE_NAME=${{ secrets.IMAGE_NAME }}" >> .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo "GEMINI_URL=${{ secrets.GEMINI_URL }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "MASTER_INITIAL_EMAIL=${{ secrets.MASTER_INITIAL_EMAIL }}" >> .env
          echo "MASTER_INITIAL_NAME=${{ secrets.MASTER_INITIAL_NAME }}" >> .env
          echo "MASTER_INITIAL_NICKNAME=${{ secrets.MASTER_INITIAL_NICKNAME }}" >> .env
          echo "MASTER_INITIAL_PASSWORD=${{ secrets.MASTER_INITIAL_PASSWORD }}" >> .env
          echo "MASTER_INITIAL_PHONE_NUMBER=${{ secrets.MASTER_INITIAL_PHONE_NUMBER }}" >> .env 

      - name: Copy docker-compose.yml and .env to SERVER
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml, .env" # 두 파일 모두 전송
          target: "${{ secrets.WORK_DIRECTORY }}"

      - name: Deploy to SERVER
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.WORK_DIRECTORY }}
            sudo docker compose pull
            sudo docker compose up -d