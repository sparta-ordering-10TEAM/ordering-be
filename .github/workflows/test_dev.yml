name: Test on dev

on:
  pull_request:
    branches: [ dev ]

jobs:
  build-test-dev:
    runs-on: ubuntu-latest
    environment: ordering-be

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ordering_test
          POSTGRES_USER: ordering_test
          POSTGRES_PASSWORD: ordering_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ordering_test -d ordering_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with test profile
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test